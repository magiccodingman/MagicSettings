name: Organize source files

on:
  push:
    branches: [ agent/organize-source-files ]

permissions:
  contents: write

jobs:
  organize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/organize-source-files
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Split consolidated files
        run: python3 .github/scripts/organize_source.py
      - name: Remove one-shot automation
        run: rm .github/scripts/organize_source.py .github/workflows/organize-source.yml
      - name: Restore
        run: dotnet restore MagicSettings/MagicSettings.sln
      - name: Build
        run: dotnet build MagicSettings/MagicSettings.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test MagicSettings/MagicSettings.sln --configuration Release --no-build --logger "console;verbosity=normal"
      - name: Commit organized tree
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Organize source files by feature"
          git push origin HEAD:agent/organize-source-files
