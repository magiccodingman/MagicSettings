name: Clean organized source

on:
  push:
    branches: [ agent/organize-source-files ]

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/organize-source-files
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Clean generated files
        run: python3 .github/scripts/clean_organized_source.py
      - name: Remove one-shot automation
        run: rm .github/scripts/clean_organized_source.py .github/workflows/clean-organized-source.yml
      - name: Restore
        run: dotnet restore MagicSettings/MagicSettings.sln
      - name: Build
        run: dotnet build MagicSettings/MagicSettings.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test MagicSettings/MagicSettings.sln --configuration Release --no-build --logger "console;verbosity=normal"
      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean organized source layout"
          git push origin HEAD:agent/organize-source-files
