name: Bootstrap MagicSettings implementation

on:
  push:
    branches:
      - agent/build-magicsettings-runtime

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Rebuild source tree
        shell: bash
        run: |
          set -euo pipefail
          cat .magicsettings-source.part-* > /tmp/magicsettings-source.tar.gz.b64
          base64 --decode /tmp/magicsettings-source.tar.gz.b64 > /tmp/magicsettings-source.tar.gz
          rm -rf MagicSettings wiki README.md .gitignore .github
          tar -xzf /tmp/magicsettings-source.tar.gz -C .
          rm -f .magicsettings-source.part-*
          rm -f .github/workflows/bootstrap.yml

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        working-directory: MagicSettings
        run: dotnet restore MagicSettings.sln

      - name: Build
        working-directory: MagicSettings
        run: dotnet build MagicSettings.sln --configuration Release --no-restore

      - name: Test
        working-directory: MagicSettings
        run: dotnet test MagicSettings.sln --configuration Release --no-build --logger "console;verbosity=normal"

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build MagicSettings runtime"
          git push origin HEAD:agent/build-magicsettings-runtime
